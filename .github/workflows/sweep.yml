name: Sweep OpenClaw Items

on:
  workflow_dispatch:
    inputs:
      apply_closures:
        description: "Comment and close during review when Codex gives a high-confidence allowed decision"
        required: false
        default: "false"
      apply_existing:
        description: "Apply existing proposed close decisions without rerunning Codex; skips items changed since review"
        required: false
        default: "false"
      apply_limit:
        description: "Maximum existing proposed items to close in apply-existing mode"
        required: false
        default: "20"
      apply_min_age_days:
        description: "Minimum item age in days before apply-existing can close it"
        required: false
        default: "0"
      apply_kind:
        description: "Item kind to close in apply-existing mode: issue, pull_request, or all"
        required: false
        default: "issue"
      apply_close_delay_ms:
        description: "Delay after each close/comment pair to avoid GitHub secondary write throttling"
        required: false
        default: "1500"
      batch_size:
        description: "Items per worker job"
        required: false
        default: "5"
      codex_timeout_ms:
        description: "Per-item Codex timeout in milliseconds"
        required: false
        default: "600000"
      shard_count:
        description: "Parallel shards"
        required: false
        default: "40"
      item_number:
        description: "Optional single issue/PR number to review"
        required: false
        default: ""
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: clawsweeper-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' && 'apply' || 'review' }}
  cancel-in-progress: false

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.apply_existing != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      apply_closures: ${{ steps.mode.outputs.apply_closures }}
      batch_size: ${{ steps.mode.outputs.batch_size }}
      codex_timeout_ms: ${{ steps.mode.outputs.codex_timeout_ms }}
      matrix: ${{ steps.select.outputs.matrix }}
      planned_count: ${{ steps.select.outputs.planned_count }}
      planned_capacity: ${{ steps.select.outputs.planned_capacity }}
      planned_shards: ${{ steps.select.outputs.planned_shards }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clawsweeper/package-lock.json

      - name: Install dependencies
        working-directory: clawsweeper
        run: npm ci

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: npm run build

      - id: mode
        run: |
          {
            echo "apply_closures=${{ github.event.inputs.apply_closures || 'false' }}"
            echo "batch_size=${{ github.event.inputs.batch_size || '5' }}"
            echo "codex_timeout_ms=${{ github.event.inputs.codex_timeout_ms || '600000' }}"
          } >> "$GITHUB_OUTPUT"

      - id: select
        working-directory: clawsweeper
        env:
          SHARD_COUNT: ${{ github.event.inputs.shard_count || '40' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
          ITEM_NUMBER: ${{ github.event.inputs.item_number || '' }}
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          item_arg=()
          if [ -n "$ITEM_NUMBER" ]; then
            item_arg=(--item-number "$ITEM_NUMBER")
          fi
          npm run --silent plan -- \
            --batch-size "$BATCH_SIZE" \
            --max-pages 250 \
            --shard-count "$SHARD_COUNT" \
            --codex-model gpt-5.4 \
            --codex-reasoning-effort medium \
            --codex-service-tier fast \
            "${item_arg[@]}" > plan.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const plan = JSON.parse(fs.readFileSync("plan.json", "utf8"));
          console.log(`matrix=${JSON.stringify(plan.matrix)}`);
          console.log(`planned_count=${plan.candidates.length}`);
          console.log(`planned_capacity=${Number(process.env.BATCH_SIZE || 5) * Number(process.env.SHARD_COUNT || 40)}`);
          console.log(`planned_shards=${plan.matrix.length}`);
          NODE
          cat plan.json

  review:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clawsweeper/package-lock.json

      - name: Install dependencies
        working-directory: clawsweeper
        run: npm ci

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: npm run build

      - name: Install Codex
        run: npm install -g @openai/codex@latest --prefer-offline

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$CODEX_API_KEY"
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - uses: actions/cache@v4
        with:
          path: openclaw-cache.git
          key: openclaw-git-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            openclaw-git-${{ runner.os }}-

      - name: Check out OpenClaw
        run: |
          set -euo pipefail
          url="https://github.com/openclaw/openclaw.git"
          if [ -d openclaw-cache.git ]; then
            git -C openclaw-cache.git remote set-url origin "$url"
            git -C openclaw-cache.git fetch --prune --depth=1 origin main
          else
            git clone --bare --depth=1 "$url" openclaw-cache.git
          fi
          git clone --reference-if-able openclaw-cache.git --dissociate --depth=1 --branch main --single-branch "$url" openclaw
          git -C openclaw rev-parse --short HEAD

      - name: Review shard
        working-directory: clawsweeper
        env:
          CLAWSWEEPER_APPLY_CLOSURES: ${{ needs.plan.outputs.apply_closures }}
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          npm run review -- \
            --openclaw-dir ../openclaw \
            --artifact-dir ../review-artifacts/shard-${{ matrix.shard }} \
            --batch-size ${{ needs.plan.outputs.batch_size }} \
            --max-pages 250 \
            --codex-model gpt-5.4 \
            --codex-reasoning-effort medium \
            --codex-service-tier fast \
            --codex-timeout-ms ${{ needs.plan.outputs.codex_timeout_ms }} \
            --item-numbers "${{ matrix.item_numbers }}" \
            --readonly-openclaw \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${{ needs.plan.outputs.planned_shards }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-shard-${{ matrix.shard }}
          path: review-artifacts/shard-${{ matrix.shard }}
          if-no-files-found: ignore

  publish:
    needs: [plan, review]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.apply_existing != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ClawSweeper
        run: npm run build

      - uses: actions/download-artifact@v4
        with:
          pattern: review-shard-*
          path: artifacts
          merge-multiple: true

      - name: Sync before applying artifacts
        run: git pull --rebase

      - name: Apply review artifacts
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: npm run apply-artifacts -- --artifact-dir artifacts

      - name: Commit dashboard and review files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md items closed
          if git diff --cached --quiet; then
            echo "No review changes"
          else
            git commit -m "chore: update sweep dashboard"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash
            done
            git push
          fi

      - name: Continue sweep
        if: ${{ success() && needs.plan.outputs.apply_closures != 'true' && needs.plan.outputs.planned_count == needs.plan.outputs.planned_capacity && (github.event_name != 'workflow_dispatch' || github.event.inputs.item_number == '') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run "Sweep OpenClaw Items" \
            --ref main \
            -f apply_closures=false \
            -f apply_existing=false \
            -f batch_size="${{ needs.plan.outputs.batch_size }}" \
            -f shard_count=40 \
            -f codex_timeout_ms="${{ needs.plan.outputs.codex_timeout_ms }}"

  apply-existing:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ClawSweeper
        run: npm run build

      - name: Sync before applying decisions
        run: git pull --rebase

      - name: Apply unchanged proposed decisions
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          limit="${{ github.event.inputs.apply_limit || '20' }}"
          min_age_days="${{ github.event.inputs.apply_min_age_days || '0' }}"
          apply_kind="${{ github.event.inputs.apply_kind || 'issue' }}"
          close_delay_ms="${{ github.event.inputs.apply_close_delay_ms || '1500' }}"
          npm run apply-decisions -- \
            --limit "$limit" \
            --min-age-days "$min_age_days" \
            --apply-kind "$apply_kind" \
            --close-delay-ms "$close_delay_ms" \
            --processed-limit "$((limit * 2))" \
            --skip-dashboard

      - name: Commit apply results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add items closed apply-report.json
          if git diff --cached --quiet; then
            echo "No apply changes"
          else
            git commit -m "chore: apply sweep decisions"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git pull --rebase --autostash
            done
            git push
          fi
