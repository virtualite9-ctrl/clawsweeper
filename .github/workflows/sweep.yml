name: ClawSweeper

run-name: ${{ github.event_name == 'repository_dispatch' && format('Review event item {0}#{1}', github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.client_payload.item_number || '?') || (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' && github.event.inputs.apply_sync_comments_only == 'true') && 'Sync Codex review comments' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *' || github.event.schedule == '8,23,38,53 * * * *'))) && 'Apply ClawSweeper closures' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '7 */6 * * *' || github.event.schedule == '12 */6 * * *'))) && 'Audit ClawSweeper dashboard' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '*/5 * * * *' || github.event.schedule == '2/5 * * * *'))) && 'Review hot ClawSweeper items' || 'Review ClawSweeper items' }}

on:
  repository_dispatch:
    types: [clawsweeper_item]
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to sweep"
        required: false
        default: "openclaw/openclaw"
      apply_closures:
        description: "Deprecated; review shards are proposal-only. Use apply_existing to close unchanged proposed decisions."
        required: false
        default: "false"
      apply_existing:
        description: "Apply existing proposed close decisions without rerunning Codex; skips items changed since review"
        required: false
        default: "false"
      apply_limit:
        description: "Maximum existing proposed items to close in apply-existing mode"
        required: false
        default: "20"
      apply_min_age_days:
        description: "Minimum item age in days before apply-existing can close it"
        required: false
        default: "0"
      apply_min_age_minutes:
        description: "Optional minute-level minimum item age before apply-existing can close it"
        required: false
        default: ""
      apply_kind:
        description: "Item kind to close in apply-existing mode: issue, pull_request, or all"
        required: false
        default: "all"
      apply_close_reasons:
        description: "Close reasons enabled in apply-existing mode, comma-separated or all"
        required: false
        default: "all"
      apply_stale_min_age_days:
        description: "Minimum item age in days before stale-insufficient-info issue closes"
        required: false
        default: "30"
      apply_item_numbers:
        description: "Optional comma-separated item numbers to sync/apply first"
        required: false
        default: ""
      apply_sync_comments_only:
        description: "Only sync durable review comments; do not close items"
        required: false
        default: "false"
      apply_comment_sync_min_age_days:
        description: "Minimum age in days before comment-only sync rewrites an existing review comment"
        required: false
        default: "7"
      apply_close_delay_ms:
        description: "Delay after each close/comment pair to avoid GitHub secondary write throttling"
        required: false
        default: "2000"
      apply_progress_every:
        description: "Log apply progress every N processed records, plus every close"
        required: false
        default: "10"
      apply_checkpoint_size:
        description: "Fresh closes per checkpoint commit in apply-existing mode"
        required: false
        default: "50"
      batch_size:
        description: "Items per worker job"
        required: false
        default: "5"
      codex_timeout_ms:
        description: "Per-item Codex timeout in milliseconds"
        required: false
        default: "600000"
      shard_count:
        description: "Parallel shards"
        required: false
        default: "100"
      item_number:
        description: "Optional single issue/PR number to review"
        required: false
        default: ""
      item_numbers:
        description: "Optional comma-separated issue/PR numbers to review"
        required: false
        default: ""
      hot_intake:
        description: "Run the low-latency intake lane for new/active issues and PRs"
        required: false
        default: "false"
      apply_after_review:
        description: "After publishing selected review artifacts, immediately apply safe close proposals for those items"
        required: false
        default: "false"
      apply_after_review_close_reasons:
        description: "Close reasons enabled for immediate post-review apply"
        required: false
        default: "implemented_on_main,duplicate_or_superseded"
      apply_after_review_min_age_minutes:
        description: "Minute-level item age floor for immediate post-review apply"
        required: false
        default: "0"
      audit_dashboard:
        description: "Refresh README Audit Health without running review or apply work"
        required: false
        default: "false"
  schedule:
    - cron: "*/5 * * * *"
    - cron: "2/5 * * * *"
    - cron: "7 */6 * * *"
    - cron: "12 */6 * * *"
    - cron: "17 * * * *"
    - cron: "22 * * * *"
    - cron: "3 * * * *"
    - cron: "18 * * * *"
    - cron: "33 * * * *"
    - cron: "48 * * * *"
    - cron: "8,23,38,53 * * * *"

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.event_name == 'repository_dispatch' && format('clawsweeper-event-{0}-{1}', github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.client_payload.item_number || github.run_id) || format('{0}-{1}', (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' && github.event.inputs.apply_sync_comments_only == 'true') && 'clawsweeper-comment-sync' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *' || github.event.schedule == '8,23,38,53 * * * *'))) && 'clawsweeper-apply' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '*/5 * * * *' || github.event.schedule == '2/5 * * * *'))) && 'clawsweeper-intake' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '7 */6 * * *' || github.event.schedule == '12 */6 * * *'))) && 'clawsweeper-audit' || 'clawsweeper-review', github.event.inputs.target_repo || github.event.client_payload.target_repo || ((github.event.schedule == '2/5 * * * *' || github.event.schedule == '22 * * * *' || github.event.schedule == '8,23,38,53 * * * *' || github.event.schedule == '12 */6 * * *') && 'openclaw/clawhub' || 'openclaw/openclaw')) }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

jobs:
  event-review-apply:
    name: Review, comment, and apply event item
    if: ${{ github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve event payload
        id: target
        run: |
          set -euo pipefail
          target_repo="${{ github.event.client_payload.target_repo || 'openclaw/openclaw' }}"
          item_number="${{ github.event.client_payload.item_number || '' }}"
          item_kind="${{ github.event.client_payload.item_kind || '' }}"
          if ! printf '%s' "$target_repo" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid target_repo: $target_repo" >&2
            exit 1
          fi
          if ! printf '%s' "$item_number" | grep -Eq '^[0-9]+$'; then
            echo "Invalid item_number: $item_number" >&2
            exit 1
          fi
          case "$item_kind" in
            ""|"issue"|"pull_request") ;;
            *)
              echo "Invalid item_kind: $item_kind" >&2
              exit 1
              ;;
          esac
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
            echo "target_checkout_dir=$target_name"
            echo "item_number=$item_number"
          } >> "$GITHUB_OUTPUT"

      - name: Create target read token
        id: target-read-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        run: pnpm run build

      - name: Install Codex
        run: npm install -g @openai/codex@0.125.0 --prefer-offline

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$CODEX_API_KEY"
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - uses: actions/cache@v4
        with:
          path: ${{ steps.target.outputs.target_checkout_dir }}-cache.git
          key: ${{ steps.target.outputs.target_repo_name }}-event-git-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ${{ steps.target.outputs.target_repo_name }}-event-git-${{ runner.os }}-
            ${{ steps.target.outputs.target_repo_name }}-git-${{ runner.os }}-

      - name: Check out target repository
        run: |
          set -euo pipefail
          url="https://github.com/${{ steps.target.outputs.target_repo }}.git"
          cache_dir="${{ steps.target.outputs.target_checkout_dir }}-cache.git"
          checkout_dir="${{ steps.target.outputs.target_checkout_dir }}"
          if [ -d "$cache_dir" ]; then
            git -C "$cache_dir" remote set-url origin "$url"
            git -C "$cache_dir" fetch --prune --depth=1 origin main
          else
            git clone --bare --depth=1 "$url" "$cache_dir"
          fi
          git clone --reference-if-able "$cache_dir" --dissociate --depth=1 --branch main --single-branch "$url" "$checkout_dir"
          git -C "$checkout_dir" rev-parse --short HEAD

      - name: Review exact event item
        env:
          GH_TOKEN: ${{ steps.target-read-token.outputs.token }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          pnpm run review -- \
            --target-repo "${{ steps.target.outputs.target_repo }}" \
            --target-dir "${{ steps.target.outputs.target_checkout_dir }}" \
            --artifact-dir artifacts/event \
            --batch-size 1 \
            --max-pages 1 \
            --codex-model gpt-5.5 \
            --codex-reasoning-effort high \
            --codex-sandbox danger-full-access \
            --codex-service-tier fast \
            --codex-timeout-ms 600000 \
            --item-numbers "${{ steps.target.outputs.item_number }}" \
            --readonly-openclaw \
            --shard-index 0 \
            --shard-count 1

      - name: Create target write token
        id: target-write-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Publish event result and apply safe close
        env:
          GH_TOKEN: ${{ steps.target-write-token.outputs.token }}
          REPO_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          ITEM_NUMBER: ${{ steps.target.outputs.item_number }}
          CLOSE_REASONS: ${{ github.event.client_payload.apply_close_reasons || 'implemented_on_main,duplicate_or_superseded' }}
          MIN_AGE_MINUTES: ${{ github.event.client_payload.apply_min_age_minutes || '0' }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          test -n "$REPO_TOKEN"
          git remote set-url origin "https://x-access-token:${REPO_TOKEN}@github.com/${{ github.repository }}.git"
          git pull --rebase
          pnpm run apply-artifacts -- --target-repo "$TARGET_REPO" --artifact-dir artifacts/event
          pnpm run apply-decisions -- \
            --target-repo "$TARGET_REPO" \
            --item-numbers "$ITEM_NUMBER" \
            --apply-kind all \
            --apply-close-reasons "$CLOSE_REASONS" \
            --stale-min-age-days 30 \
            --limit 1 \
            --processed-limit 20 \
            --min-age-minutes "$MIN_AGE_MINUTES" \
            --close-delay-ms 1000 \
            --comment-sync-min-age-days 0 \
            --progress-every 1
          synced_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync("apply-report.json","utf8")); console.log(r.filter((x)=>x.action==="review_comment_synced").length)')"
          closed_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync("apply-report.json","utf8")); console.log(r.filter((x)=>x.action==="closed").length)')"
          pnpm run status -- \
            --state "Event review applied" \
            --detail "Reviewed event item #$ITEM_NUMBER, synced durable comment(s): $synced_count, closed safe proposal(s): $closed_count. Close reasons enabled: $CLOSE_REASONS." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md records apply-report.json
          if git diff --cached --quiet; then
            echo "No event result changes"
          else
            git commit -m "chore: apply event sweep result"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

  plan:
    name: Plan review candidates
    if: ${{ github.event_name != 'repository_dispatch' && !((github.event_name == 'workflow_dispatch' && (github.event.inputs.apply_existing == 'true' || github.event.inputs.audit_dashboard == 'true')) || (github.event_name == 'schedule' && ((github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *' || github.event.schedule == '8,23,38,53 * * * *') || (github.event.schedule == '7 */6 * * *' || github.event.schedule == '12 */6 * * *')))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      apply_closures: ${{ steps.mode.outputs.apply_closures }}
      batch_size: ${{ steps.mode.outputs.batch_size }}
      codex_timeout_ms: ${{ steps.mode.outputs.codex_timeout_ms }}
      hot_intake: ${{ steps.mode.outputs.hot_intake }}
      matrix: ${{ steps.select.outputs.matrix }}
      max_pages: ${{ steps.mode.outputs.max_pages }}
      planned_count: ${{ steps.select.outputs.planned_count }}
      planned_capacity: ${{ steps.select.outputs.planned_capacity }}
      planned_shards: ${{ steps.select.outputs.planned_shards }}
      shard_count: ${{ steps.mode.outputs.shard_count }}
      target_checkout_dir: ${{ steps.target.outputs.target_checkout_dir }}
      target_repo: ${{ steps.target.outputs.target_repo }}
      target_repo_name: ${{ steps.target.outputs.target_repo_name }}
      target_repo_owner: ${{ steps.target.outputs.target_repo_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0

      - name: Resolve target repository
        id: target
        run: |
          target_repo="${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || '' }}"
          if [ -z "$target_repo" ]; then
            case "${{ github.event.schedule || '' }}" in
              "2/5 * * * *"|"22 * * * *"|"8,23,38,53 * * * *"|"12 */6 * * *")
                target_repo="openclaw/clawhub"
                ;;
              *)
                target_repo="openclaw/openclaw"
                ;;
            esac
          fi
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
            echo "target_checkout_dir=$target_name"
          } >> "$GITHUB_OUTPUT"

      - name: Create target read token
        id: target-read-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: clawsweeper
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: pnpm run build

      - name: Publish planning-started status
        if: ${{ !((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *'))) }}
        continue-on-error: true
        working-directory: clawsweeper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm run status -- \
            --state "Planning review" \
            --detail "Planner is scanning GitHub for the next review candidates. Candidate counts and shard details will be posted after planning completes." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "chore: mark sweep planning started"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - id: mode
        run: |
          hot_intake="${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '*/5 * * * *' || github.event.schedule == '2/5 * * * *'))) && 'true' || 'false' }}"
          exact_item="${{ github.event.client_payload.item_number || github.event.inputs.item_number || github.event.inputs.item_numbers || '' }}"
          if [ "$hot_intake" = "true" ] && [ -n "$exact_item" ]; then
            batch_size="1"
            shard_count="1"
            max_pages="1"
          elif [ "$hot_intake" = "true" ]; then
            batch_size="1"
            shard_count="20"
            max_pages="2"
          else
            batch_size="${{ github.event.inputs.batch_size || '5' }}"
            shard_count="${{ github.event.inputs.shard_count || '100' }}"
            max_pages="250"
          fi
          {
            echo "apply_closures=false"
            echo "batch_size=$batch_size"
            echo "codex_timeout_ms=${{ github.event.inputs.codex_timeout_ms || '600000' }}"
            echo "hot_intake=$hot_intake"
            echo "max_pages=$max_pages"
            echo "shard_count=$shard_count"
          } >> "$GITHUB_OUTPUT"

      - id: select
        working-directory: clawsweeper
        env:
          SHARD_COUNT: ${{ steps.mode.outputs.shard_count }}
          BATCH_SIZE: ${{ steps.mode.outputs.batch_size }}
          HOT_INTAKE: ${{ steps.mode.outputs.hot_intake }}
          ITEM_NUMBER: ${{ github.event.inputs.item_number || '' }}
          ITEM_NUMBERS: ${{ github.event.inputs.item_numbers || github.event.client_payload.item_number || '' }}
          MAX_PAGES: ${{ steps.mode.outputs.max_pages }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          GH_TOKEN: ${{ steps.target-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          item_arg=()
          if [ -n "$ITEM_NUMBER" ]; then
            item_arg=(--item-number "$ITEM_NUMBER")
          fi
          if [ -n "$ITEM_NUMBERS" ]; then
            item_arg+=("--item-numbers" "$ITEM_NUMBERS")
          fi
          hot_intake_arg=()
          if [ "$HOT_INTAKE" = "true" ]; then
            hot_intake_arg=(--hot-intake)
          fi
          pnpm run --silent plan -- \
            --target-repo "$TARGET_REPO" \
            --batch-size "$BATCH_SIZE" \
            --max-pages "$MAX_PAGES" \
            --shard-count "$SHARD_COUNT" \
            --codex-model gpt-5.5 \
            --codex-reasoning-effort high \
            --codex-sandbox danger-full-access \
            --codex-service-tier fast \
            "${hot_intake_arg[@]}" \
            "${item_arg[@]}" > plan.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const plan = JSON.parse(fs.readFileSync("plan.json", "utf8"));
          console.log(`matrix=${JSON.stringify(plan.matrix)}`);
          console.log(`planned_count=${plan.candidates.length}`);
          console.log(`planned_capacity=${Number(process.env.BATCH_SIZE || 5) * Number(process.env.SHARD_COUNT || 100)}`);
          console.log(`planned_shards=${plan.matrix.length}`);
          NODE
          cat plan.json

      - name: Publish planning status
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.apply_existing != 'true' }}
        continue-on-error: true
        working-directory: clawsweeper
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm run reconcile -- --target-repo "$TARGET_REPO"
          pnpm run dashboard -- --target-repo "$TARGET_REPO"
          pnpm run status -- \
            --state "${{ steps.mode.outputs.hot_intake == 'true' && 'Hot intake in progress' || 'Review in progress' }}" \
            --detail "${{ steps.mode.outputs.hot_intake == 'true' && 'Hot intake planned' || 'Planned' }} ${{ steps.select.outputs.planned_count }} items across ${{ steps.select.outputs.planned_shards }} shards. Capacity is ${{ steps.select.outputs.planned_capacity }} items. Review shards are starting; publish will merge artifacts when they finish." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md records
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "chore: mark sweep review in progress"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

  review:
    name: Review shard ${{ matrix.shard }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
      issues: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0
          persist-credentials: false

      - name: Create target read token
        id: target-read-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.plan.outputs.target_repo_owner }}
          repositories: ${{ needs.plan.outputs.target_repo_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: clawsweeper
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: pnpm run build

      - name: Install Codex
        run: npm install -g @openai/codex@0.125.0 --prefer-offline

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$CODEX_API_KEY"
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - uses: actions/cache@v4
        with:
          path: ${{ needs.plan.outputs.target_checkout_dir }}-cache.git
          key: ${{ needs.plan.outputs.target_repo_name }}-git-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ${{ needs.plan.outputs.target_repo_name }}-git-${{ runner.os }}-

      - name: Check out target repository
        run: |
          set -euo pipefail
          url="https://github.com/${{ needs.plan.outputs.target_repo }}.git"
          cache_dir="${{ needs.plan.outputs.target_checkout_dir }}-cache.git"
          checkout_dir="${{ needs.plan.outputs.target_checkout_dir }}"
          if [ -d "$cache_dir" ]; then
            git -C "$cache_dir" remote set-url origin "$url"
            git -C "$cache_dir" fetch --prune --depth=1 origin main
          else
            git clone --bare --depth=1 "$url" "$cache_dir"
          fi
          git clone --reference-if-able "$cache_dir" --dissociate --depth=1 --branch main --single-branch "$url" "$checkout_dir"
          git -C "$checkout_dir" rev-parse --short HEAD

      - name: Review shard
        working-directory: clawsweeper
        env:
          CLAWSWEEPER_APPLY_CLOSURES: ${{ needs.plan.outputs.apply_closures }}
          GH_TOKEN: ${{ steps.target-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          hot_intake_arg=()
          if [ "${{ needs.plan.outputs.hot_intake }}" = "true" ]; then
            hot_intake_arg=(--hot-intake)
          fi
          pnpm run review -- \
            --target-repo "${{ needs.plan.outputs.target_repo }}" \
            --target-dir "../${{ needs.plan.outputs.target_checkout_dir }}" \
            --artifact-dir ../review-artifacts/shard-${{ matrix.shard }} \
            --batch-size ${{ needs.plan.outputs.batch_size }} \
            --max-pages ${{ needs.plan.outputs.max_pages }} \
            --codex-model gpt-5.5 \
            --codex-reasoning-effort high \
            --codex-sandbox danger-full-access \
            --codex-service-tier fast \
            --codex-timeout-ms ${{ needs.plan.outputs.codex_timeout_ms }} \
            --item-numbers "${{ matrix.item_numbers }}" \
            "${hot_intake_arg[@]}" \
            --readonly-openclaw \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${{ needs.plan.outputs.planned_shards }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-shard-${{ matrix.shard }}
          path: |
            review-artifacts/shard-${{ matrix.shard }}/*.md
          if-no-files-found: ignore

  publish:
    name: Publish review artifacts
    needs: [plan, review]
    if: ${{ always() && github.event_name != 'repository_dispatch' && !((github.event_name == 'workflow_dispatch' && (github.event.inputs.apply_existing == 'true' || github.event.inputs.audit_dashboard == 'true')) || (github.event_name == 'schedule' && ((github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *' || github.event.schedule == '8,23,38,53 * * * *') || (github.event.schedule == '7 */6 * * *' || github.event.schedule == '12 */6 * * *')))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create target write token
        id: target-write-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.plan.outputs.target_repo_owner }}
          repositories: ${{ needs.plan.outputs.target_repo_name }}
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        run: pnpm run build

      - uses: actions/download-artifact@v4
        with:
          pattern: review-shard-*
          path: artifacts
          merge-multiple: true

      - name: Sync before applying artifacts
        run: git pull --rebase

      - name: Apply review artifacts
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
        run: |
          pnpm run apply-artifacts -- --target-repo "$TARGET_REPO" --artifact-dir artifacts
          pnpm run status -- \
            --state "${{ needs.plan.outputs.hot_intake == 'true' && 'Hot intake publish complete' || 'Review publish complete' }}" \
            --detail "Merged ${{ needs.plan.outputs.hot_intake == 'true' && 'hot intake' || 'review' }} artifacts for run ${{ github.run_id }}. Folder reconciliation moved tracked files to match current GitHub open/closed state, and the dashboard reflects completed shards." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit dashboard and review files
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
        run: |
          pnpm run reconcile -- --target-repo "$TARGET_REPO"
          pnpm run dashboard -- --target-repo "$TARGET_REPO"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md records
          if git diff --cached --quiet; then
            echo "No review changes"
          else
            git commit -m "chore: update sweep dashboard"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Sync selected review comments
        if: ${{ success() }}
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ steps.target-write-token.outputs.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          item_numbers="$(node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const files = fs.existsSync("artifacts")
            ? fs.readdirSync("artifacts", { recursive: true }).filter((name) => String(name).endsWith(".md"))
            : [];
          const numbers = files
            .map((name) => String(path.basename(String(name), ".md")).match(/(\d+)$/)?.[1])
            .filter(Boolean)
            .map(Number)
            .sort((left, right) => left - right);
          process.stdout.write(numbers.join(","));
          NODE
          )"
          if [ -z "$item_numbers" ]; then
            echo "No review artifacts to sync comments for."
            exit 0
          fi
          git pull --rebase
          pnpm run apply-decisions -- \
            --target-repo "$TARGET_REPO" \
            --item-numbers "$item_numbers" \
            --sync-comments-only \
            --apply-kind all \
            --limit 0 \
            --processed-limit 1000 \
            --max-runtime-ms 720000 \
            --comment-sync-min-age-days 7 \
            --progress-every 25
          synced_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync("apply-report.json","utf8")); console.log(r.filter((x)=>x.action==="review_comment_synced").length)')"
          pnpm run status -- \
            --state "Review comments checked" \
            --detail "Checked selected durable Codex review comments and synced missing or stale comments. Synced: $synced_count. Item numbers: $item_numbers." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md records apply-report.json
          if git diff --cached --quiet; then
            echo "No review comment metadata changes"
          else
            git commit -m "chore: sync selected review comments"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Apply selected safe close proposals
        if: ${{ success() && github.event.inputs.apply_after_review == 'true' }}
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ steps.target-write-token.outputs.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          item_numbers="$(node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const files = fs.existsSync("artifacts")
            ? fs.readdirSync("artifacts", { recursive: true }).filter((name) => String(name).endsWith(".md"))
            : [];
          const numbers = files
            .map((name) => String(path.basename(String(name), ".md")).match(/(\d+)$/)?.[1])
            .filter(Boolean)
            .map(Number)
            .sort((left, right) => left - right);
          process.stdout.write(numbers.join(","));
          NODE
          )"
          if [ -z "$item_numbers" ]; then
            echo "No review artifacts to apply."
            exit 0
          fi
          item_count="$(node -e 'const value = process.argv[1] || ""; console.log(value ? value.split(",").length : 0)' "$item_numbers")"
          close_reasons="${{ github.event.inputs.apply_after_review_close_reasons || 'implemented_on_main,duplicate_or_superseded' }}"
          min_age_minutes="${{ github.event.inputs.apply_after_review_min_age_minutes || '0' }}"
          git pull --rebase
          pnpm run apply-decisions -- \
            --target-repo "$TARGET_REPO" \
            --item-numbers "$item_numbers" \
            --apply-kind all \
            --apply-close-reasons "$close_reasons" \
            --stale-min-age-days 30 \
            --limit "$item_count" \
            --processed-limit "$((item_count * 10))" \
            --min-age-minutes "$min_age_minutes" \
            --close-delay-ms 1000 \
            --comment-sync-min-age-days 0 \
            --progress-every 1
          closed_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync("apply-report.json","utf8")); console.log(r.filter((x)=>x.action==="closed").length)')"
          pnpm run status -- \
            --state "Immediate apply checked" \
            --detail "Checked selected safe close proposals right after review publish. Closed: $closed_count/$item_count. Close reasons enabled: $close_reasons. Item numbers: $item_numbers." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md records apply-report.json
          if git diff --cached --quiet; then
            echo "No immediate apply changes"
          else
            git commit -m "chore: apply selected sweep decisions"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Continue sweep
        if: ${{ success() && needs.plan.outputs.hot_intake != 'true' && needs.plan.outputs.apply_closures != 'true' && needs.plan.outputs.planned_count == needs.plan.outputs.planned_capacity && (github.event_name != 'workflow_dispatch' || (github.event.inputs.item_number == '' && github.event.inputs.item_numbers == '')) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run sweep.yml \
            --ref main \
            -f apply_closures=false \
            -f apply_existing=false \
            -f target_repo="${{ needs.plan.outputs.target_repo }}" \
            -f batch_size="${{ needs.plan.outputs.batch_size }}" \
            -f shard_count="${{ needs.plan.outputs.shard_count }}" \
            -f codex_timeout_ms="${{ needs.plan.outputs.codex_timeout_ms }}"

  audit-dashboard:
    name: Audit dashboard
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '7 */6 * * *' || github.event.schedule == '12 */6 * * *')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target repository
        id: target
        run: |
          target_repo="${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || '' }}"
          if [ -z "$target_repo" ]; then
            case "${{ github.event.schedule || '' }}" in
              "12 */6 * * *")
                target_repo="openclaw/clawhub"
                ;;
              *)
                target_repo="openclaw/openclaw"
                ;;
            esac
          fi
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
          } >> "$GITHUB_OUTPUT"


      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        run: pnpm run build

      - name: Refresh Audit Health
        env:
          GH_TOKEN: ${{ steps.target-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
        run: |
          set -euo pipefail
          git pull --rebase
          pnpm run audit -- --target-repo "$TARGET_REPO" --max-pages 250 --sample-limit 25 --output /tmp/clawsweeper-audit.json --update-dashboard
          pnpm run status -- \
            --state "Audit finished" \
            --detail "Refreshed README Audit Health from a full live $TARGET_REPO state audit. Normal review/apply dashboard heartbeats preserve this block without rerunning the audit scan." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit Audit Health
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No audit health changes"
          else
            git commit -m "chore: update sweep audit health"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

  apply-existing:
    name: Apply close proposals
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && (github.event.schedule == '3 * * * *' || github.event.schedule == '18 * * * *' || github.event.schedule == '33 * * * *' || github.event.schedule == '48 * * * *' || github.event.schedule == '8,23,38,53 * * * *')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target repository
        id: target
        run: |
          target_repo="${{ github.event.inputs.target_repo || '' }}"
          if [ -z "$target_repo" ]; then
            case "${{ github.event.schedule || '' }}" in
              "8,23,38,53 * * * *")
                target_repo="openclaw/clawhub"
                ;;
              *)
                target_repo="openclaw/openclaw"
                ;;
            esac
          fi
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
          } >> "$GITHUB_OUTPUT"

      - name: Create target write token
        id: target-write-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build ClawSweeper
        run: pnpm run build

      - name: Sync before applying decisions
        run: git pull --rebase

      - name: Apply unchanged proposed decisions with checkpoints
        env:
          GH_TOKEN: ${{ steps.target-write-token.outputs.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          CLAWSWEEPER_PUBLISH_THROTTLE_STATUS: "true"
          CLAWSWEEPER_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLAWSWEEPER_THROTTLE_STATUS_MIN_WAIT_MS: "60000"
          CLAWSWEEPER_THROTTLE_STATUS_MIN_INTERVAL_MS: "120000"
        run: |
          test -n "$GH_TOKEN"
          limit="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_limit || '20' }}"
          min_age_days="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_min_age_days || '0' }}"
          min_age_minutes="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_min_age_minutes || '' }}"
          apply_kind="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_kind || 'all' }}"
          apply_close_reasons="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_close_reasons || 'all' }}"
          stale_min_age_days="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_stale_min_age_days || '30' }}"
          close_delay_ms="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_close_delay_ms || '2000' }}"
          progress_every="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_progress_every || '10' }}"
          checkpoint_size="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_checkpoint_size || '50' }}"
          item_numbers="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_item_numbers || '' }}"
          sync_comments_only="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_sync_comments_only || 'false' }}"
          comment_sync_min_age_days="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_comment_sync_min_age_days || '7' }}"
          sync_comments_arg=()
          if [ "$sync_comments_only" = "true" ]; then
            sync_comments_arg=(--sync-comments-only)
          fi
          min_age_minutes_arg=()
          if [ -n "$min_age_minutes" ]; then
            min_age_minutes_arg=(--min-age-minutes "$min_age_minutes")
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .artifacts/apply-reports
          paths_include_readme() {
            for path in "$@"; do
              if [ "$path" = "README.md" ]; then
                return 0
              fi
            done
            return 1
          }
          sync_for_publish_retry() {
            if ! paths_include_readme "$@"; then
              git restore --staged README.md || true
              git restore README.md || true
            fi
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Dirty worktree before publish retry:"
              git status --short
              return 1
            fi
            git fetch origin main
            if git rebase -X theirs origin/main; then
              return 0
            fi
            conflicts="$(git diff --name-only --diff-filter=U || true)"
            if [ -z "$conflicts" ]; then
              return 1
            fi
            unsupported_conflict=0
            while IFS= read -r path; do
              case "$path" in
                records/*/items/*.md)
                  git rm -f -- "$path" || true
                  ;;
                records/*/closed/*.md | README.md | apply-report.json)
                  git add -- "$path"
                  ;;
                *)
                  echo "Unsupported rebase conflict path: $path"
                  unsupported_conflict=1
                  ;;
              esac
            done <<< "$conflicts"
            if [ "$unsupported_conflict" -ne 0 ]; then
              return 1
            fi
            GIT_EDITOR=true git rebase --continue
          }
          publish_changes() {
            message="$1"
            shift
            git add "$@"
            if git diff --cached --quiet; then
              echo "No changes for: $message"
              return 0
            fi
            git commit -m "$message"
            for _attempt in 1 2 3; do
              if git push; then
                return 0
              fi
              if ! sync_for_publish_retry "$@"; then
                git rebase --abort || true
                return 1
              fi
            done
            git push
          }
          publish_readme_status() {
            message="$1"
            if ! publish_changes "$message" README.md; then
              echo "Best-effort README status update failed: $message"
              git restore README.md || true
            fi
          }
          proposed_item_numbers() {
            APPLY_KIND="$apply_kind" APPLY_CLOSE_REASONS="$apply_close_reasons" STALE_MIN_AGE_DAYS="$stale_min_age_days" MIN_AGE_DAYS="$min_age_days" MIN_AGE_MINUTES="$min_age_minutes" TARGET_REPO="$TARGET_REPO" node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const allowedReasons = new Set([
            "cannot_reproduce",
            "clawhub",
            "duplicate_or_superseded",
            "incoherent",
            "implemented_on_main",
            "not_actionable_in_repo",
            "stale_insufficient_info",
          ]);

          const applyKind = process.env.APPLY_KIND || "all";
          const targetRepo = process.env.TARGET_REPO || "openclaw/openclaw";
          const applyCloseReasonsRaw = process.env.APPLY_CLOSE_REASONS || "all";
          const applyCloseReasons =
            applyCloseReasonsRaw === "all"
              ? null
              : new Set(applyCloseReasonsRaw.split(",").map((reason) => reason.trim()).filter(Boolean));
          const staleMinAgeDays = Number(process.env.STALE_MIN_AGE_DAYS || "30");
          const minAgeMinutes = process.env.MIN_AGE_MINUTES ? Number(process.env.MIN_AGE_MINUTES) : null;
          const minAgeMs = minAgeMinutes === null ? Number(process.env.MIN_AGE_DAYS || "0") * 24 * 60 * 60 * 1000 : minAgeMinutes * 60 * 1000;
          const olderThan = (iso, milliseconds) => {
            if (milliseconds <= 0) return true;
            const parsed = Date.parse(iso || "");
            return Number.isFinite(parsed) && Date.now() - parsed > milliseconds;
          };
          const targetSlug = targetRepo.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
          const itemsDir = path.join("records", targetSlug, "items");
          const frontMatterValue = (markdown, key) =>
            markdown.match(new RegExp(`^${key}:\\s*(.+)$`, "m"))?.[1]?.trim().replace(/^"|"$/g, "");
          const repoFor = (markdown, name) => frontMatterValue(markdown, "repository") || (/^\d+\.md$/.test(name) ? "openclaw/openclaw" : "");
          const numberFor = (name) => Number(name.match(/(\d+)\.md$/)?.[1] || 0);
          const allowedForTarget = (type, reason) => {
            if (targetRepo === "openclaw/clawhub") return type === "pull_request" && reason === "implemented_on_main";
            if (type === "pull_request" && reason === "stale_insufficient_info") return false;
            return allowedReasons.has(reason);
          };

          const names = fs.existsSync(itemsDir) ? fs.readdirSync(itemsDir) : [];
          const numbers = names
            .filter((name) => /(?:^|[a-z0-9-]-)\d+\.md$/.test(name))
            .flatMap((name) => {
              const markdown = fs.readFileSync(path.join(itemsDir, name), "utf8");
              if (repoFor(markdown, name) !== targetRepo) return [];
              const type = frontMatterValue(markdown, "type");
              if (applyKind !== "all" && type && type !== applyKind) return [];
              if (frontMatterValue(markdown, "decision") !== "close") return [];
              if (frontMatterValue(markdown, "confidence") !== "high") return [];
              if (frontMatterValue(markdown, "action_taken") !== "proposed_close") return [];
              const reason = frontMatterValue(markdown, "close_reason");
              if (!allowedForTarget(type, reason)) return [];
              if (applyCloseReasons && !applyCloseReasons.has(reason)) return [];
              if (reason === "stale_insufficient_info" && !olderThan(frontMatterValue(markdown, "item_created_at"), staleMinAgeDays * 24 * 60 * 60 * 1000)) return [];
              if (!olderThan(frontMatterValue(markdown, "item_created_at"), minAgeMs)) return [];
              return [numberFor(name)];
            })
            .sort((left, right) => left - right);

          process.stdout.write(numbers.join(","));
          NODE
          }
          pnpm run reconcile -- --target-repo "$TARGET_REPO"
          pnpm run dashboard -- --target-repo "$TARGET_REPO"
          if [ "$sync_comments_only" != "true" ] && [ -z "$item_numbers" ]; then
            item_numbers="$(proposed_item_numbers)"
            if [ -n "$item_numbers" ]; then
              proposed_count="$(node -e 'const value = process.argv[1] || ""; console.log(value ? value.split(",").length : 0)' "$item_numbers")"
              if [ "$proposed_count" -lt "$limit" ]; then
                limit="$proposed_count"
              fi
              echo "Auto-selected $proposed_count proposed close(s): $item_numbers"
            fi
          fi
          item_numbers_arg=()
          if [ -n "$item_numbers" ]; then
            item_numbers_arg=(--item-numbers "$item_numbers")
          fi
          if [ "$sync_comments_only" != "true" ] && [ -z "$item_numbers" ]; then
            echo "No unchanged high-confidence close proposals are awaiting apply. Scheduled apply wakes every 15 minutes and exits without scanning unrelated keep-open records when there is no close work."
            {
              echo "APPLY_CLOSED_TOTAL=0"
              echo "APPLY_LIMIT=1"
              echo "APPLY_MIN_AGE_DAYS=$min_age_days"
              echo "APPLY_MIN_AGE_MINUTES=$min_age_minutes"
              echo "APPLY_KIND=$apply_kind"
              echo "APPLY_CLOSE_REASONS=$apply_close_reasons"
              echo "APPLY_STALE_MIN_AGE_DAYS=$stale_min_age_days"
              echo "APPLY_CLOSE_DELAY_MS=$close_delay_ms"
              echo "APPLY_PROGRESS_EVERY=$progress_every"
              echo "APPLY_CHECKPOINT_SIZE=$checkpoint_size"
              echo "APPLY_ITEM_NUMBERS="
              echo "APPLY_SYNC_COMMENTS_ONLY=false"
              echo "APPLY_COMMENT_SYNC_MIN_AGE_DAYS=$comment_sync_min_age_days"
              echo "APPLY_NOOP=true"
            } >> "$GITHUB_ENV"
            exit 0
          fi
          pnpm run status -- \
            --state "Apply in progress" \
            --detail "Starting apply/comment-sync run for up to $limit fresh $apply_kind closes. Close reasons: $apply_close_reasons. Existing Codex automated review comments are updated in place when closing or when comment-only sync is stale by ${comment_sync_min_age_days} day(s); checkpoints commit every $checkpoint_size fresh closes; close delay is ${close_delay_ms}ms; sync-comments-only=$sync_comments_only; item numbers=${item_numbers:-all}." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if ! publish_changes "chore: mark sweep apply in progress" README.md records; then
            echo "Best-effort apply start status update failed"
            git restore README.md || true
          fi
          closed_total=0
          checkpoint=0
          if [ "$sync_comments_only" = "true" ]; then
            checkpoint=1
            echo "::group::Apply checkpoint $checkpoint"
            echo "Syncing durable review comments only for item numbers: ${item_numbers:-all}"
            pnpm run apply-decisions -- \
              --target-repo "$TARGET_REPO" \
              --limit 0 \
              --min-age-days "$min_age_days" \
              "${min_age_minutes_arg[@]}" \
              --apply-kind "$apply_kind" \
              --apply-close-reasons "$apply_close_reasons" \
              --stale-min-age-days "$stale_min_age_days" \
              --close-delay-ms "$close_delay_ms" \
              --progress-every "$progress_every" \
              --processed-limit "$((checkpoint_size * 20))" \
              --comment-sync-min-age-days "$comment_sync_min_age_days" \
              "${item_numbers_arg[@]}" \
              "${sync_comments_arg[@]}"
            cp apply-report.json ".artifacts/apply-reports/apply-report-$checkpoint.json"
            result_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.length)' "$checkpoint")"
            synced_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.filter((x)=>x.action==="review_comment_synced").length)' "$checkpoint")"
            publish_changes "chore: sync sweep review comments checkpoint $checkpoint" records apply-report.json
            pnpm run dashboard -- --target-repo "$TARGET_REPO"
            pnpm run status -- \
              --state "Apply comments synced" \
              --detail "Comment-only apply checkpoint $checkpoint finished. Synced durable review comments: $synced_count. Result records: $result_count. Item numbers: ${item_numbers:-all}." \
              --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            publish_readme_status "chore: update sweep comment sync status"
            echo "::endgroup::"
          fi
          while [ "$closed_total" -lt "$limit" ]; do
            if [ "$sync_comments_only" = "true" ]; then
              break
            fi
            remaining=$((limit - closed_total))
            chunk_limit="$checkpoint_size"
            if [ "$remaining" -lt "$chunk_limit" ]; then
              chunk_limit="$remaining"
            fi
            checkpoint=$((checkpoint + 1))
            echo "::group::Apply checkpoint $checkpoint"
            echo "Applying up to $chunk_limit fresh closes; $closed_total/$limit already closed in this run"
            CLAWSWEEPER_APPLY_CHECKPOINT="$checkpoint" pnpm run apply-decisions -- \
              --target-repo "$TARGET_REPO" \
              --limit "$chunk_limit" \
              --min-age-days "$min_age_days" \
              "${min_age_minutes_arg[@]}" \
              --apply-kind "$apply_kind" \
              --apply-close-reasons "$apply_close_reasons" \
              --stale-min-age-days "$stale_min_age_days" \
              --close-delay-ms "$close_delay_ms" \
              --progress-every "$progress_every" \
              --processed-limit "$((chunk_limit * 20))" \
              --comment-sync-min-age-days "$comment_sync_min_age_days" \
              "${item_numbers_arg[@]}" \
              "${sync_comments_arg[@]}"
            cp apply-report.json ".artifacts/apply-reports/apply-report-$checkpoint.json"
            # shellcheck disable=SC2016
            node -e 'const fs=require("node:fs"); const path=require("node:path"); const dir=".artifacts/apply-reports"; const files=fs.readdirSync(dir).filter((name)=>/^apply-report-\d+\.json$/.test(name)).sort((left,right)=>Number(left.match(/\d+/)[0])-Number(right.match(/\d+/)[0])); const combined=files.flatMap((file)=>JSON.parse(fs.readFileSync(path.join(dir,file),"utf8"))); fs.writeFileSync("apply-report.json", `${JSON.stringify(combined,null,2)}\n`);'
            closed_in_chunk="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.filter((x)=>x.action==="closed").length)' "$checkpoint")"
            result_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.length)' "$checkpoint")"
            closed_total=$((closed_total + closed_in_chunk))
            echo "Checkpoint $checkpoint result_count=$result_count closed_in_chunk=$closed_in_chunk closed_total=$closed_total/$limit"
            publish_changes "chore: apply sweep decisions checkpoint $checkpoint" records apply-report.json
            pnpm run dashboard -- --target-repo "$TARGET_REPO"
            pnpm run status -- \
              --state "Apply in progress" \
              --detail "Checkpoint $checkpoint finished. Fresh closes in checkpoint: $closed_in_chunk. Total fresh closes in this run: $closed_total/$limit. Result records in checkpoint: $result_count, including durable review comment syncs." \
              --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            publish_readme_status "chore: update sweep apply checkpoint $checkpoint status"
            echo "::endgroup::"
            if [ "$result_count" -eq 0 ]; then
              echo "No more applicable proposed closes found."
              break
            fi
            if [ "$closed_in_chunk" -eq 0 ]; then
              echo "Checkpoint made no fresh closes; stopping to avoid a retry loop."
              break
            fi
          done
          pnpm run dashboard -- --target-repo "$TARGET_REPO"
          pnpm run status -- \
            --state "Apply finished" \
            --detail "Apply/comment-sync run finished with $closed_total fresh closes out of requested limit $limit. See apply-report.json for per-item results." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          publish_readme_status "chore: mark sweep apply finished"
          {
            echo "APPLY_CLOSED_TOTAL=$closed_total"
            echo "APPLY_LIMIT=$limit"
            echo "APPLY_MIN_AGE_DAYS=$min_age_days"
            echo "APPLY_MIN_AGE_MINUTES=$min_age_minutes"
            echo "APPLY_KIND=$apply_kind"
            echo "APPLY_CLOSE_REASONS=$apply_close_reasons"
            echo "APPLY_STALE_MIN_AGE_DAYS=$stale_min_age_days"
            echo "APPLY_CLOSE_DELAY_MS=$close_delay_ms"
            echo "APPLY_PROGRESS_EVERY=$progress_every"
            echo "APPLY_CHECKPOINT_SIZE=$checkpoint_size"
            echo "APPLY_ITEM_NUMBERS=$item_numbers"
            echo "APPLY_TARGET_REPO=$TARGET_REPO"
            echo "APPLY_SYNC_COMMENTS_ONLY=$sync_comments_only"
            echo "APPLY_COMMENT_SYNC_MIN_AGE_DAYS=$comment_sync_min_age_days"
          } >> "$GITHUB_ENV"

      - name: Commit apply results
        run: |
          if [ "${APPLY_NOOP:-false}" = "true" ]; then
            echo "No proposed closes were ready; no apply results to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md records apply-report.json
          if git diff --cached --quiet; then
            echo "No remaining apply changes"
          else
            git commit -m "chore: apply sweep decisions"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Continue apply sweep
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${APPLY_NOOP:-false}" = "true" ]; then
            echo "No proposed closes were ready; not queueing another apply run."
            exit 0
          fi
          if [ "${APPLY_CLOSED_TOTAL:-0}" -lt "${APPLY_LIMIT:-0}" ]; then
            echo "Apply closed ${APPLY_CLOSED_TOTAL:-0}/${APPLY_LIMIT:-0}; not queueing another apply run."
            exit 0
          fi
          if [ "${APPLY_SYNC_COMMENTS_ONLY:-false}" = "true" ]; then
            echo "Comment-only apply run finished; not queueing another apply run."
            exit 0
          fi

          echo "Apply reached requested limit; queueing another apply run."
          gh workflow run sweep.yml \
            --ref main \
            -f apply_existing=true \
            -f target_repo="$APPLY_TARGET_REPO" \
            -f apply_limit="$APPLY_LIMIT" \
            -f apply_min_age_days="$APPLY_MIN_AGE_DAYS" \
            -f apply_min_age_minutes="$APPLY_MIN_AGE_MINUTES" \
            -f apply_kind="$APPLY_KIND" \
            -f apply_close_reasons="$APPLY_CLOSE_REASONS" \
            -f apply_stale_min_age_days="$APPLY_STALE_MIN_AGE_DAYS" \
            -f apply_item_numbers="$APPLY_ITEM_NUMBERS" \
            -f apply_sync_comments_only="$APPLY_SYNC_COMMENTS_ONLY" \
            -f apply_comment_sync_min_age_days="$APPLY_COMMENT_SYNC_MIN_AGE_DAYS" \
            -f apply_close_delay_ms="$APPLY_CLOSE_DELAY_MS" \
            -f apply_progress_every="$APPLY_PROGRESS_EVERY" \
            -f apply_checkpoint_size="$APPLY_CHECKPOINT_SIZE"
