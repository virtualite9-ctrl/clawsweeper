name: ClawSweeper

run-name: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' && github.event.inputs.apply_sync_comments_only == 'true') && 'Sync Codex review comments' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && github.event.schedule == '37 * * * *')) && 'Apply OpenClaw closures' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && github.event.schedule == '7 */6 * * *')) && 'Audit ClawSweeper dashboard' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')) && 'Review hot OpenClaw items' || 'Review OpenClaw items' }}

on:
  workflow_dispatch:
    inputs:
      apply_closures:
        description: "Deprecated; review shards are proposal-only. Use apply_existing to close unchanged proposed decisions."
        required: false
        default: "false"
      apply_existing:
        description: "Apply existing proposed close decisions without rerunning Codex; skips items changed since review"
        required: false
        default: "false"
      apply_limit:
        description: "Maximum existing proposed items to close in apply-existing mode"
        required: false
        default: "20"
      apply_min_age_days:
        description: "Minimum item age in days before apply-existing can close it"
        required: false
        default: "0"
      apply_kind:
        description: "Item kind to close in apply-existing mode: issue, pull_request, or all"
        required: false
        default: "all"
      apply_item_numbers:
        description: "Optional comma-separated item numbers to sync/apply first"
        required: false
        default: ""
      apply_sync_comments_only:
        description: "Only sync durable review comments; do not close items"
        required: false
        default: "false"
      apply_close_delay_ms:
        description: "Delay after each close/comment pair to avoid GitHub secondary write throttling"
        required: false
        default: "2000"
      apply_progress_every:
        description: "Log apply progress every N processed records, plus every close"
        required: false
        default: "10"
      apply_checkpoint_size:
        description: "Fresh closes per checkpoint commit in apply-existing mode"
        required: false
        default: "50"
      batch_size:
        description: "Items per worker job"
        required: false
        default: "5"
      codex_timeout_ms:
        description: "Per-item Codex timeout in milliseconds"
        required: false
        default: "600000"
      shard_count:
        description: "Parallel shards"
        required: false
        default: "100"
      item_number:
        description: "Optional single issue/PR number to review"
        required: false
        default: ""
      hot_intake:
        description: "Run the low-latency intake lane for new/active issues and PRs"
        required: false
        default: "false"
      audit_dashboard:
        description: "Refresh README Audit Health without running review or apply work"
        required: false
        default: "false"
  schedule:
    - cron: "*/5 * * * *"
    - cron: "7 */6 * * *"
    - cron: "17 * * * *"
    - cron: "37 * * * *"

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true' && github.event.inputs.apply_sync_comments_only == 'true') && 'clawsweeper-comment-sync' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && github.event.schedule == '37 * * * *')) && 'clawsweeper-apply' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')) && 'clawsweeper-intake' || ((github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && github.event.schedule == '7 */6 * * *')) && 'clawsweeper-audit' || 'clawsweeper-review' }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan review candidates
    if: ${{ !((github.event_name == 'workflow_dispatch' && (github.event.inputs.apply_existing == 'true' || github.event.inputs.audit_dashboard == 'true')) || (github.event_name == 'schedule' && (github.event.schedule == '37 * * * *' || github.event.schedule == '7 */6 * * *'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLAWSWEEPER_APP_ID: ${{ secrets.CLAWSWEEPER_APP_ID }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
    outputs:
      apply_closures: ${{ steps.mode.outputs.apply_closures }}
      batch_size: ${{ steps.mode.outputs.batch_size }}
      codex_timeout_ms: ${{ steps.mode.outputs.codex_timeout_ms }}
      hot_intake: ${{ steps.mode.outputs.hot_intake }}
      matrix: ${{ steps.select.outputs.matrix }}
      max_pages: ${{ steps.mode.outputs.max_pages }}
      planned_count: ${{ steps.select.outputs.planned_count }}
      planned_capacity: ${{ steps.select.outputs.planned_capacity }}
      planned_shards: ${{ steps.select.outputs.planned_shards }}
      shard_count: ${{ steps.mode.outputs.shard_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0

      - name: Create OpenClaw read token
        id: openclaw-read-token
        if: ${{ env.CLAWSWEEPER_APP_ID != '' && env.CLAWSWEEPER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CLAWSWEEPER_APP_ID }}
          private-key: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clawsweeper/package-lock.json

      - name: Install dependencies
        working-directory: clawsweeper
        run: npm ci

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: npm run build

      - name: Publish planning-started status
        if: ${{ !((github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && github.event.schedule == '37 * * * *')) }}
        continue-on-error: true
        working-directory: clawsweeper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm run status -- \
            --state "Planning review" \
            --detail "Planner is scanning GitHub for the next review candidates. Candidate counts and shard details will be posted after planning completes." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "chore: mark sweep planning started"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - id: mode
        run: |
          hot_intake="${{ ((github.event_name == 'workflow_dispatch' && github.event.inputs.hot_intake == 'true') || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')) && 'true' || 'false' }}"
          if [ "$hot_intake" = "true" ]; then
            batch_size="1"
            shard_count="20"
            max_pages="2"
          else
            batch_size="${{ github.event.inputs.batch_size || '5' }}"
            shard_count="${{ github.event.inputs.shard_count || '100' }}"
            max_pages="250"
          fi
          {
            echo "apply_closures=false"
            echo "batch_size=$batch_size"
            echo "codex_timeout_ms=${{ github.event.inputs.codex_timeout_ms || '600000' }}"
            echo "hot_intake=$hot_intake"
            echo "max_pages=$max_pages"
            echo "shard_count=$shard_count"
          } >> "$GITHUB_OUTPUT"

      - id: select
        working-directory: clawsweeper
        env:
          SHARD_COUNT: ${{ steps.mode.outputs.shard_count }}
          BATCH_SIZE: ${{ steps.mode.outputs.batch_size }}
          HOT_INTAKE: ${{ steps.mode.outputs.hot_intake }}
          ITEM_NUMBER: ${{ github.event.inputs.item_number || '' }}
          MAX_PAGES: ${{ steps.mode.outputs.max_pages }}
          GH_TOKEN: ${{ steps.openclaw-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          item_arg=()
          if [ -n "$ITEM_NUMBER" ]; then
            item_arg=(--item-number "$ITEM_NUMBER")
          fi
          hot_intake_arg=()
          if [ "$HOT_INTAKE" = "true" ]; then
            hot_intake_arg=(--hot-intake)
          fi
          npm run --silent plan -- \
            --batch-size "$BATCH_SIZE" \
            --max-pages "$MAX_PAGES" \
            --shard-count "$SHARD_COUNT" \
            --codex-model gpt-5.5 \
            --codex-reasoning-effort high \
            --codex-sandbox danger-full-access \
            --codex-service-tier fast \
            "${hot_intake_arg[@]}" \
            "${item_arg[@]}" > plan.json
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const plan = JSON.parse(fs.readFileSync("plan.json", "utf8"));
          console.log(`matrix=${JSON.stringify(plan.matrix)}`);
          console.log(`planned_count=${plan.candidates.length}`);
          console.log(`planned_capacity=${Number(process.env.BATCH_SIZE || 5) * Number(process.env.SHARD_COUNT || 100)}`);
          console.log(`planned_shards=${plan.matrix.length}`);
          NODE
          cat plan.json

      - name: Publish planning status
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.apply_existing != 'true' }}
        continue-on-error: true
        working-directory: clawsweeper
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm run reconcile
          npm run dashboard
          npm run status -- \
            --state "${{ steps.mode.outputs.hot_intake == 'true' && 'Hot intake in progress' || 'Review in progress' }}" \
            --detail "${{ steps.mode.outputs.hot_intake == 'true' && 'Hot intake planned' || 'Planned' }} ${{ steps.select.outputs.planned_count }} items across ${{ steps.select.outputs.planned_shards }} shards. Capacity is ${{ steps.select.outputs.planned_capacity }} items. Review shards are starting; publish will merge artifacts when they finish." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md items closed
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "chore: mark sweep review in progress"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

  review:
    name: Review shard ${{ matrix.shard }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CLAWSWEEPER_APP_ID: ${{ secrets.CLAWSWEEPER_APP_ID }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: clawsweeper
          fetch-depth: 0
          persist-credentials: false

      - name: Create OpenClaw read token
        id: openclaw-read-token
        if: ${{ env.CLAWSWEEPER_APP_ID != '' && env.CLAWSWEEPER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CLAWSWEEPER_APP_ID }}
          private-key: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clawsweeper/package-lock.json

      - name: Install dependencies
        working-directory: clawsweeper
        run: npm ci

      - name: Build ClawSweeper
        working-directory: clawsweeper
        run: npm run build

      - name: Install Codex
        run: npm install -g @openai/codex@0.125.0 --prefer-offline

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY || secrets.OPENAI_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$CODEX_API_KEY"
          printenv OPENAI_API_KEY | codex login --with-api-key
          codex login status

      - uses: actions/cache@v4
        with:
          path: openclaw-cache.git
          key: openclaw-git-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            openclaw-git-${{ runner.os }}-

      - name: Check out OpenClaw
        run: |
          set -euo pipefail
          url="https://github.com/openclaw/openclaw.git"
          if [ -d openclaw-cache.git ]; then
            git -C openclaw-cache.git remote set-url origin "$url"
            git -C openclaw-cache.git fetch --prune --depth=1 origin main
          else
            git clone --bare --depth=1 "$url" openclaw-cache.git
          fi
          git clone --reference-if-able openclaw-cache.git --dissociate --depth=1 --branch main --single-branch "$url" openclaw
          git -C openclaw rev-parse --short HEAD

      - name: Review shard
        working-directory: clawsweeper
        env:
          CLAWSWEEPER_APPLY_CLOSURES: ${{ needs.plan.outputs.apply_closures }}
          GH_TOKEN: ${{ steps.openclaw-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          hot_intake_arg=()
          if [ "${{ needs.plan.outputs.hot_intake }}" = "true" ]; then
            hot_intake_arg=(--hot-intake)
          fi
          npm run review -- \
            --openclaw-dir ../openclaw \
            --artifact-dir ../review-artifacts/shard-${{ matrix.shard }} \
            --batch-size ${{ needs.plan.outputs.batch_size }} \
            --max-pages ${{ needs.plan.outputs.max_pages }} \
            --codex-model gpt-5.5 \
            --codex-reasoning-effort high \
            --codex-sandbox danger-full-access \
            --codex-service-tier fast \
            --codex-timeout-ms ${{ needs.plan.outputs.codex_timeout_ms }} \
            --item-numbers "${{ matrix.item_numbers }}" \
            "${hot_intake_arg[@]}" \
            --readonly-openclaw \
            --shard-index ${{ matrix.shard }} \
            --shard-count ${{ needs.plan.outputs.planned_shards }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-shard-${{ matrix.shard }}
          path: |
            review-artifacts/shard-${{ matrix.shard }}/*.md
          if-no-files-found: ignore

  publish:
    name: Publish review artifacts
    needs: [plan, review]
    if: ${{ always() && !((github.event_name == 'workflow_dispatch' && (github.event.inputs.apply_existing == 'true' || github.event.inputs.audit_dashboard == 'true')) || (github.event_name == 'schedule' && (github.event.schedule == '37 * * * *' || github.event.schedule == '7 */6 * * *'))) }}
    runs-on: ubuntu-latest
    env:
      CLAWSWEEPER_APP_ID: ${{ secrets.CLAWSWEEPER_APP_ID }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create OpenClaw write token
        id: openclaw-write-token
        if: ${{ env.CLAWSWEEPER_APP_ID != '' && env.CLAWSWEEPER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CLAWSWEEPER_APP_ID }}
          private-key: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ClawSweeper
        run: npm run build

      - uses: actions/download-artifact@v4
        with:
          pattern: review-shard-*
          path: artifacts
          merge-multiple: true

      - name: Sync before applying artifacts
        run: git pull --rebase

      - name: Apply review artifacts
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          npm run apply-artifacts -- --artifact-dir artifacts
          npm run status -- \
            --state "${{ needs.plan.outputs.hot_intake == 'true' && 'Hot intake publish complete' || 'Review publish complete' }}" \
            --detail "Merged ${{ needs.plan.outputs.hot_intake == 'true' && 'hot intake' || 'review' }} artifacts for run ${{ github.run_id }}. Folder reconciliation moved tracked files to match current GitHub open/closed state, and the dashboard reflects completed shards." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit dashboard and review files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md items closed
          if git diff --cached --quiet; then
            echo "No review changes"
          else
            git commit -m "chore: update sweep dashboard"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Sync hot intake review comments
        if: ${{ success() && needs.plan.outputs.hot_intake == 'true' }}
        env:
          GH_TOKEN: ${{ steps.openclaw-write-token.outputs.token }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          item_numbers="$(find artifacts -type f -name '*.md' -exec basename {} .md \; | sort -n | paste -sd, -)"
          if [ -z "$item_numbers" ]; then
            echo "No hot intake artifacts to sync comments for."
            exit 0
          fi
          git pull --rebase
          npm run apply-decisions -- \
            --item-numbers "$item_numbers" \
            --sync-comments-only \
            --apply-kind all \
            --limit 0 \
            --processed-limit 200 \
            --progress-every 1
          synced_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync("apply-report.json","utf8")); console.log(r.filter((x)=>x.action==="review_comment_synced").length)')"
          npm run status -- \
            --state "Hot intake comments synced" \
            --detail "Synced durable Codex review comments for $synced_count hot-intake item(s). Item numbers: $item_numbers." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git add README.md items closed apply-report.json
          if git diff --cached --quiet; then
            echo "No hot intake comment metadata changes"
          else
            git commit -m "chore: sync hot intake review comments"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Continue sweep
        if: ${{ success() && needs.plan.outputs.hot_intake != 'true' && needs.plan.outputs.apply_closures != 'true' && needs.plan.outputs.planned_count == needs.plan.outputs.planned_capacity && (github.event_name != 'workflow_dispatch' || github.event.inputs.item_number == '') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run sweep.yml \
            --ref main \
            -f apply_closures=false \
            -f apply_existing=false \
            -f batch_size="${{ needs.plan.outputs.batch_size }}" \
            -f shard_count="${{ needs.plan.outputs.shard_count }}" \
            -f codex_timeout_ms="${{ needs.plan.outputs.codex_timeout_ms }}"

  audit-dashboard:
    name: Audit dashboard
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.audit_dashboard == 'true') || (github.event_name == 'schedule' && github.event.schedule == '7 */6 * * *') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAWSWEEPER_APP_ID: ${{ secrets.CLAWSWEEPER_APP_ID }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create OpenClaw read token
        id: openclaw-read-token
        if: ${{ env.CLAWSWEEPER_APP_ID != '' && env.CLAWSWEEPER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CLAWSWEEPER_APP_ID }}
          private-key: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ClawSweeper
        run: npm run build

      - name: Refresh Audit Health
        env:
          GH_TOKEN: ${{ steps.openclaw-read-token.outputs.token || secrets.OPENCLAW_GH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git pull --rebase
          npm run audit -- --max-pages 250 --sample-limit 25 --output /tmp/clawsweeper-audit.json --update-dashboard
          npm run status -- \
            --state "Audit finished" \
            --detail "Refreshed README Audit Health from a full live OpenClaw state audit. Normal review/apply dashboard heartbeats preserve this block without rerunning the audit scan." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Commit Audit Health
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No audit health changes"
          else
            git commit -m "chore: update sweep audit health"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

  apply-existing:
    name: Apply close proposals
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_existing == 'true') || (github.event_name == 'schedule' && github.event.schedule == '37 * * * *') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CLAWSWEEPER_APP_ID: ${{ secrets.CLAWSWEEPER_APP_ID }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create OpenClaw write token
        id: openclaw-write-token
        if: ${{ env.CLAWSWEEPER_APP_ID != '' && env.CLAWSWEEPER_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.CLAWSWEEPER_APP_ID }}
          private-key: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw
          permission-issues: write
          permission-pull-requests: write

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ClawSweeper
        run: npm run build

      - name: Sync before applying decisions
        run: git pull --rebase

      - name: Apply unchanged proposed decisions with checkpoints
        env:
          GH_TOKEN: ${{ steps.openclaw-write-token.outputs.token }}
          CLAWSWEEPER_PUBLISH_THROTTLE_STATUS: "true"
          CLAWSWEEPER_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLAWSWEEPER_THROTTLE_STATUS_MIN_WAIT_MS: "60000"
          CLAWSWEEPER_THROTTLE_STATUS_MIN_INTERVAL_MS: "120000"
        run: |
          test -n "$GH_TOKEN"
          limit="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_limit || '20' }}"
          min_age_days="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_min_age_days || '0' }}"
          apply_kind="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_kind || 'all' }}"
          close_delay_ms="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_close_delay_ms || '2000' }}"
          progress_every="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_progress_every || '10' }}"
          checkpoint_size="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_checkpoint_size || '50' }}"
          item_numbers="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_item_numbers || '' }}"
          sync_comments_only="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_sync_comments_only || 'false' }}"
          item_numbers_arg=()
          if [ -n "$item_numbers" ]; then
            item_numbers_arg=(--item-numbers "$item_numbers")
          fi
          sync_comments_arg=()
          if [ "$sync_comments_only" = "true" ]; then
            sync_comments_arg=(--sync-comments-only)
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .artifacts/apply-reports
          paths_include_readme() {
            for path in "$@"; do
              if [ "$path" = "README.md" ]; then
                return 0
              fi
            done
            return 1
          }
          sync_for_publish_retry() {
            if ! paths_include_readme "$@"; then
              git restore --staged README.md || true
              git restore README.md || true
            fi
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Dirty worktree before publish retry:"
              git status --short
              return 1
            fi
            git fetch origin main
            if git rebase -X theirs origin/main; then
              return 0
            fi
            conflicts="$(git diff --name-only --diff-filter=U || true)"
            if [ -z "$conflicts" ]; then
              return 1
            fi
            unsupported_conflict=0
            while IFS= read -r path; do
              case "$path" in
                items/*.md)
                  git rm -f -- "$path" || true
                  ;;
                closed/*.md | README.md | apply-report.json)
                  git add -- "$path"
                  ;;
                *)
                  echo "Unsupported rebase conflict path: $path"
                  unsupported_conflict=1
                  ;;
              esac
            done <<< "$conflicts"
            if [ "$unsupported_conflict" -ne 0 ]; then
              return 1
            fi
            GIT_EDITOR=true git rebase --continue
          }
          publish_changes() {
            message="$1"
            shift
            git add "$@"
            if git diff --cached --quiet; then
              echo "No changes for: $message"
              return 0
            fi
            git commit -m "$message"
            for _attempt in 1 2 3; do
              if git push; then
                return 0
              fi
              if ! sync_for_publish_retry "$@"; then
                git rebase --abort || true
                return 1
              fi
            done
            git push
          }
          publish_readme_status() {
            message="$1"
            if ! publish_changes "$message" README.md; then
              echo "Best-effort README status update failed: $message"
              git restore README.md || true
            fi
          }
          npm run reconcile
          npm run dashboard
          npm run status -- \
            --state "Apply in progress" \
            --detail "Starting apply/comment-sync run for up to $limit fresh $apply_kind closes. Existing Codex automated review comments are updated in place; checkpoints commit every $checkpoint_size fresh closes; close delay is ${close_delay_ms}ms; sync-comments-only=$sync_comments_only; item numbers=${item_numbers:-all}." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if ! publish_changes "chore: mark sweep apply in progress" README.md items closed; then
            echo "Best-effort apply start status update failed"
            git restore README.md || true
          fi
          closed_total=0
          checkpoint=0
          if [ "$sync_comments_only" = "true" ]; then
            checkpoint=1
            echo "::group::Apply checkpoint $checkpoint"
            echo "Syncing durable review comments only for item numbers: ${item_numbers:-all}"
            npm run apply-decisions -- \
              --limit 0 \
              --min-age-days "$min_age_days" \
              --apply-kind "$apply_kind" \
              --close-delay-ms "$close_delay_ms" \
              --progress-every "$progress_every" \
              --processed-limit "$((checkpoint_size * 20))" \
              "${item_numbers_arg[@]}" \
              "${sync_comments_arg[@]}"
            cp apply-report.json ".artifacts/apply-reports/apply-report-$checkpoint.json"
            result_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.length)' "$checkpoint")"
            synced_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.filter((x)=>x.action==="review_comment_synced").length)' "$checkpoint")"
            publish_changes "chore: sync sweep review comments checkpoint $checkpoint" items closed apply-report.json
            npm run dashboard
            npm run status -- \
              --state "Apply comments synced" \
              --detail "Comment-only apply checkpoint $checkpoint finished. Synced durable review comments: $synced_count. Result records: $result_count. Item numbers: ${item_numbers:-all}." \
              --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            publish_readme_status "chore: update sweep comment sync status"
            echo "::endgroup::"
          fi
          while [ "$closed_total" -lt "$limit" ]; do
            if [ "$sync_comments_only" = "true" ]; then
              break
            fi
            remaining=$((limit - closed_total))
            chunk_limit="$checkpoint_size"
            if [ "$remaining" -lt "$chunk_limit" ]; then
              chunk_limit="$remaining"
            fi
            checkpoint=$((checkpoint + 1))
            echo "::group::Apply checkpoint $checkpoint"
            echo "Applying up to $chunk_limit fresh closes; $closed_total/$limit already closed in this run"
            CLAWSWEEPER_APPLY_CHECKPOINT="$checkpoint" npm run apply-decisions -- \
              --limit "$chunk_limit" \
              --min-age-days "$min_age_days" \
              --apply-kind "$apply_kind" \
              --close-delay-ms "$close_delay_ms" \
              --progress-every "$progress_every" \
              --processed-limit "$((chunk_limit * 20))" \
              "${item_numbers_arg[@]}" \
              "${sync_comments_arg[@]}"
            cp apply-report.json ".artifacts/apply-reports/apply-report-$checkpoint.json"
            # shellcheck disable=SC2016
            node -e 'const fs=require("node:fs"); const path=require("node:path"); const dir=".artifacts/apply-reports"; const files=fs.readdirSync(dir).filter((name)=>/^apply-report-\d+\.json$/.test(name)).sort((left,right)=>Number(left.match(/\d+/)[0])-Number(right.match(/\d+/)[0])); const combined=files.flatMap((file)=>JSON.parse(fs.readFileSync(path.join(dir,file),"utf8"))); fs.writeFileSync("apply-report.json", `${JSON.stringify(combined,null,2)}\n`);'
            closed_in_chunk="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.filter((x)=>x.action==="closed").length)' "$checkpoint")"
            result_count="$(node -e 'const fs=require("node:fs"); const r=JSON.parse(fs.readFileSync(".artifacts/apply-reports/apply-report-" + process.argv[1] + ".json", "utf8")); console.log(r.length)' "$checkpoint")"
            closed_total=$((closed_total + closed_in_chunk))
            echo "Checkpoint $checkpoint result_count=$result_count closed_in_chunk=$closed_in_chunk closed_total=$closed_total/$limit"
            publish_changes "chore: apply sweep decisions checkpoint $checkpoint" items closed apply-report.json
            npm run dashboard
            npm run status -- \
              --state "Apply in progress" \
              --detail "Checkpoint $checkpoint finished. Fresh closes in checkpoint: $closed_in_chunk. Total fresh closes in this run: $closed_total/$limit. Result records in checkpoint: $result_count, including durable review comment syncs." \
              --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            publish_readme_status "chore: update sweep apply checkpoint $checkpoint status"
            echo "::endgroup::"
            if [ "$result_count" -eq 0 ]; then
              echo "No more applicable proposed closes found."
              break
            fi
            if [ "$closed_in_chunk" -eq 0 ]; then
              echo "Checkpoint made no fresh closes; stopping to avoid a retry loop."
              break
            fi
          done
          npm run dashboard
          npm run status -- \
            --state "Apply finished" \
            --detail "Apply/comment-sync run finished with $closed_total fresh closes out of requested limit $limit. See apply-report.json for per-item results." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          publish_readme_status "chore: mark sweep apply finished"
          {
            echo "APPLY_CLOSED_TOTAL=$closed_total"
            echo "APPLY_LIMIT=$limit"
            echo "APPLY_MIN_AGE_DAYS=$min_age_days"
            echo "APPLY_KIND=$apply_kind"
            echo "APPLY_CLOSE_DELAY_MS=$close_delay_ms"
            echo "APPLY_PROGRESS_EVERY=$progress_every"
            echo "APPLY_CHECKPOINT_SIZE=$checkpoint_size"
            echo "APPLY_ITEM_NUMBERS=$item_numbers"
            echo "APPLY_SYNC_COMMENTS_ONLY=$sync_comments_only"
          } >> "$GITHUB_ENV"

      - name: Commit apply results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md items closed apply-report.json
          if git diff --cached --quiet; then
            echo "No remaining apply changes"
          else
            git commit -m "chore: apply sweep decisions"
            for _attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              git fetch origin main
              git rebase -X theirs origin/main
            done
            git push
          fi

      - name: Continue apply sweep
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${APPLY_CLOSED_TOTAL:-0}" -lt "${APPLY_LIMIT:-0}" ]; then
            echo "Apply closed ${APPLY_CLOSED_TOTAL:-0}/${APPLY_LIMIT:-0}; not queueing another apply run."
            exit 0
          fi
          if [ "${APPLY_SYNC_COMMENTS_ONLY:-false}" = "true" ]; then
            echo "Comment-only apply run finished; not queueing another apply run."
            exit 0
          fi

          echo "Apply reached requested limit; queueing another apply run."
          gh workflow run sweep.yml \
            --ref main \
            -f apply_existing=true \
            -f apply_limit="$APPLY_LIMIT" \
            -f apply_min_age_days="$APPLY_MIN_AGE_DAYS" \
            -f apply_kind="$APPLY_KIND" \
            -f apply_item_numbers="$APPLY_ITEM_NUMBERS" \
            -f apply_sync_comments_only="$APPLY_SYNC_COMMENTS_ONLY" \
            -f apply_close_delay_ms="$APPLY_CLOSE_DELAY_MS" \
            -f apply_progress_every="$APPLY_PROGRESS_EVERY" \
            -f apply_checkpoint_size="$APPLY_CHECKPOINT_SIZE"
